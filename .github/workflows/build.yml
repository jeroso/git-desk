name: Build & Release

# Builds a macOS .dmg installer (universal: Intel + Apple Silicon in one file —
# git-desk has no native deps, so a universal build is safe and simplest).
#
# - Push a tag like `v0.1.0` → builds the .dmg and attaches it to a GitHub Release.
# - Run manually (Actions → Build & Release → Run workflow) → uploads the .dmg as
#   a downloadable build artifact (no Release created).
#
# Release flow: merge your work to `main`, then tag a version on main and push it:
#   git checkout main && git pull
#   git tag v0.1.0 && git push origin v0.1.0
on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write # needed to create/update the GitHub Release

jobs:
  build:
    runs-on: macos-14 # Apple Silicon runner; --universal cross-builds the x64 slice
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build renderer + electron
        run: npm run build

      - name: Package universal .dmg
        run: npx electron-builder --mac --universal --publish never
        env:
          # No Apple Developer cert in CI → produce an unsigned .dmg instead of failing.
          CSC_IDENTITY_AUTO_DISCOVERY: false

      # Manual (workflow_dispatch) runs only: tag builds attach the .dmg to the Release below.
      - name: Upload .dmg as build artifact
        if: ${{ !startsWith(github.ref, 'refs/tags/') }}
        uses: actions/upload-artifact@v4
        with:
          name: git-desk-dmg
          path: release/*.dmg
          if-no-files-found: error
          retention-days: 7

      - name: Attach .dmg to the GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          # Release body = hand-written RELEASE_NOTES.md (Korean, user-facing changes/additions).
          # Update RELEASE_NOTES.md before tagging each release. generate_release_notes appends
          # the auto commit/PR changelog beneath the written notes.
          body_path: RELEASE_NOTES.md
          generate_release_notes: true
          files: release/*.dmg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
